apiVersion: gatekeeper/v1
name: spec-normative
description: >-
  CLAUDE.md invariant #3: docs/SPEC.md's normative registry-format prose is
  the public standard-face specification, and docs/PLAN.md is the
  authoritative execution plan referenced by AGENTS.md and the pi-extension
  agent pack. Either document changing is breaking-review-required for every
  document and agent that cites them.
level: breaking-review-required
authority:
  repo: youkale/gatekeeper
  paths:
    - docs/SPEC.md
    - docs/PLAN.md
consumers:
  - repo: youkale/gatekeeper
    paths:
      - README.md
    role: consumer
  - repo: youkale/gatekeeper
    paths:
      - pi-extension/index.ts
      - pi-extension/agents/registry-reviewer.md
    role: consumer
